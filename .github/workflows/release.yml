name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.25.0'

      - name: Download dependencies
        run: go mod download

      - name: Run go fmt
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race ./...

  build:
    name: Build Release Binaries
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 6
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.25.0'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          version="${{ steps.get_version.outputs.VERSION }}"
          output_name="rmp"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output_name="rmp.exe"
          fi

          # Base ldflags for all platforms: strip debug info, set version
          ldflags="-s -w -X main.version=${version}"

          # Platform-specific optimizations
          if [ "${{ matrix.goos }}" = "linux" ]; then
            # Static linking for Linux (fully static binary)
            ldflags="${ldflags} -extldflags '-static'"
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            # macOS: -s is sufficient, OS handles dynamic linking
            : # No additional flags needed
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            # Windows: strip debug info
            : # No additional flags needed
          fi

          # -trimpath removes build paths for reproducible builds
          go build -trimpath -ldflags="${ldflags}" -o "dist/${output_name}" ./cmd/rmp

          # Display ARM version in build output if applicable
          if [ -n "${{ matrix.goarm }}" ]; then
            echo "Built ${{ matrix.goos }}/${{ matrix.goarch }}v${{ matrix.goarm }}: ${output_name}"
          else
            echo "Built ${{ matrix.goos }}/${{ matrix.goarch }}: ${output_name}"
          fi

      - name: Create archive
        id: create_archive
        run: |
          version="${{ steps.get_version.outputs.VERSION }}"
          goos="${{ matrix.goos }}"
          goarch="${{ matrix.goarch }}"
          goarm="${{ matrix.goarm }}"
          binary_name="rmp"

          # Build archive name with ARM version suffix when applicable
          if [ -n "${goarm}" ]; then
            arch_suffix="${goarch}v${goarm}"
          else
            arch_suffix="${goarch}"
          fi

          if [ "${goos}" = "windows" ]; then
            binary_name="rmp.exe"
            archive_name="rmp-${version}-${goos}-${arch_suffix}.zip"
            (cd dist && zip "${archive_name}" "${binary_name}")
          else
            archive_name="rmp-${version}-${goos}-${arch_suffix}.tar.gz"
            tar -czf "dist/${archive_name}" -C dist "${binary_name}"
          fi

          echo "ARCHIVE=${archive_name}" >> $GITHUB_OUTPUT

      - name: Generate checksum
        run: |
          cd dist
          sha256sum ${{ steps.create_archive.outputs.ARCHIVE }} > ${{ steps.create_archive.outputs.ARCHIVE }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: |
            dist/${{ steps.create_archive.outputs.ARCHIVE }}
            dist/${{ steps.create_archive.outputs.ARCHIVE }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.get_version.outputs.VERSION }}"

          # Check if release already exists
          if gh release view "${version}" &>/dev/null; then
            echo "Release ${version} already exists. Uploading new artifacts..."
            # Upload artifacts to existing release, overwriting if they exist
            for file in dist/*.{tar.gz,zip,sha256}; do
              if [ -f "$file" ]; then
                gh release upload "${version}" "$file" --clobber
              fi
            done
          else
            # Create release with auto-generated notes
            gh release create "${version}" \
              --title "Release ${version}" \
              --generate-notes \
              --verify-tag \
              dist/*.{tar.gz,zip,sha256}
          fi
