name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run go fmt
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race ./...

  build:
    name: Build Release Binaries
    needs: test
    runs-on: ubuntu-latest
    # Windows is excluded: the GoGraph dependency uses syscall.Kill
    # (Unix-only) in its WAL crash-injection layer; cross-compilation
    # to Windows fails with "undefined: syscall.Kill".
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 6
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: freebsd
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          version="${{ steps.get_version.outputs.VERSION }}"
          ldflags="-s -w -X main.version=${version}"
          if [ "${{ matrix.goos }}" = "linux" ]; then
            ldflags="${ldflags} -extldflags '-static'"
          fi
          go build -trimpath -ldflags="${ldflags}" -o "dist/rmp" ./cmd/rmp
          if [ -n "${{ matrix.goarm }}" ]; then
            echo "Built ${{ matrix.goos }}/${{ matrix.goarch }}v${{ matrix.goarm }}"
          else
            echo "Built ${{ matrix.goos }}/${{ matrix.goarch }}"
          fi

      - name: Create archive
        id: create_archive
        run: |
          version="${{ steps.get_version.outputs.VERSION }}"
          goos="${{ matrix.goos }}"
          goarch="${{ matrix.goarch }}"
          goarm="${{ matrix.goarm }}"

          if [ -n "${goarm}" ]; then
            arch_suffix="${goarch}v${goarm}"
          else
            arch_suffix="${goarch}"
          fi

          archive_name="rmp-${version}-${goos}-${arch_suffix}.tar.gz"
          tar -czf "dist/${archive_name}" -C dist rmp
          echo "ARCHIVE=${archive_name}" >> $GITHUB_OUTPUT

      - name: Generate checksum
        run: |
          cd dist
          sha256sum ${{ steps.create_archive.outputs.ARCHIVE }} > ${{ steps.create_archive.outputs.ARCHIVE }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: |
            dist/${{ steps.create_archive.outputs.ARCHIVE }}
            dist/${{ steps.create_archive.outputs.ARCHIVE }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.get_version.outputs.VERSION }}"
          shopt -s nullglob
          artifacts=(dist/*.tar.gz dist/*.sha256)

          if gh release view "${version}" &>/dev/null; then
            echo "Release ${version} already exists. Uploading new artifacts..."
            for file in "${artifacts[@]}"; do
              gh release upload "${version}" "$file" --clobber
            done
          else
            gh release create "${version}" \
              --title "Release ${version}" \
              --generate-notes \
              --verify-tag \
              "${artifacts[@]}"
          fi
