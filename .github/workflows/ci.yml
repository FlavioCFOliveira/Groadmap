name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run go fmt
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    # Windows is excluded: the GoGraph dependency uses syscall.Kill
    # (Unix-only) in its WAL crash-injection layer; cross-compilation
    # to Windows fails with "undefined: syscall.Kill".
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ldflags="-s -w -X main.version=dev-${{ github.sha }}"
          if [ "${{ matrix.goos }}" = "linux" ]; then
            ldflags="${ldflags} -extldflags '-static'"
          fi
          go build -trimpath -ldflags="${ldflags}" -o "dist/rmp" ./cmd/rmp
          echo "Built ${{ matrix.goos }}/${{ matrix.goarch }}"

      - name: Create archive
        id: create_archive
        run: |
          sha_short=$(echo "${{ github.sha }}" | cut -c1-7)
          archive_name="rmp-dev-${sha_short}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -czf "dist/${archive_name}" -C dist rmp
          echo "ARCHIVE=${archive_name}" >> $GITHUB_OUTPUT

      - name: Generate checksum
        run: |
          cd dist
          sha256sum ${{ steps.create_archive.outputs.ARCHIVE }} > ${{ steps.create_archive.outputs.ARCHIVE }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dev-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ steps.create_archive.outputs.ARCHIVE }}
            dist/${{ steps.create_archive.outputs.ARCHIVE }}.sha256

  dev-release:
    name: Create Dev Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Get short SHA
        id: get_sha
        run: echo "SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: dev-*

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -la release/

      - name: Delete previous dev release
        run: |
          gh release delete dev --yes || true
          git push --delete origin dev || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: dev
          name: Development Build (${{ steps.get_sha.outputs.SHA_SHORT }})
          body: |
            ## Development Build

            This is an automated development build from commit `${{ steps.get_sha.outputs.SHA_SHORT }}`.

            **Warning:** This build is not stable and is intended for testing purposes only.

            ### Available Binaries

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | amd64 | rmp-dev-${{ steps.get_sha.outputs.SHA_SHORT }}-linux-amd64.tar.gz |
            | Linux | arm64 | rmp-dev-${{ steps.get_sha.outputs.SHA_SHORT }}-linux-arm64.tar.gz |
            | macOS | amd64 | rmp-dev-${{ steps.get_sha.outputs.SHA_SHORT }}-darwin-amd64.tar.gz |
            | macOS | arm64 | rmp-dev-${{ steps.get_sha.outputs.SHA_SHORT }}-darwin-arm64.tar.gz |

            ### Installation

            ```bash
            tar -xzf rmp-dev-*-<os>-<arch>.tar.gz
            sudo mv rmp /usr/local/bin/
            ```
          files: release/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
