version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - err113
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - perfsprint
    - prealloc
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    gocritic:
      # hugeParam, rangeValCopy, appendAssign already included in the performance tag
      enabled-tags:
        - performance
      enabled-checks:
        - sloppyReassign
    govet:
      enable:
        - fieldalignment
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - err113
          - errcheck
        path: _test\.go
      - linters:
          - govet
        path: _test\.go
        text: fieldalignment
      - linters:
          - errcheck
        path: internal/commands/roadmap\.go
        text: Error return value of `os.Remove` is not checked
      - linters:
          - err113
        path: internal/commands/sprint\.go
        text: do not define dynamic errors
      - linters:
          - err113
        path: internal/utils/time\.go
    paths:
      - vendor
      - .claude
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
